<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOCUS — Pomodoro Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #e8533a;
    --accent2: #f0a05a;
    --text: #f0ede8;
    --muted: #5a5a72;
    --work-color: #e8533a;
    --break-color: #4ea8a0;
    --long-color: #7b6fd4;
    --ring-size: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    transition: background 1.5s ease;
    z-index: 0;
  }
  .glow-orb.a { width: 500px; height: 500px; top: -150px; left: -100px; background: var(--accent); }
  .glow-orb.b { width: 400px; height: 400px; bottom: -100px; right: -80px; background: var(--accent2); }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 32px 20px;
    width: 100%;
    max-width: 480px;
  }

  /* Header */
  .header {
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Mode tabs */
  .modes {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .mode-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--mode-color, var(--accent));
    color: #fff;
  }
  .mode-btn:hover:not(.active) { color: var(--text); }

  /* Ring timer */
  .ring-wrapper {
    position: relative;
    width: var(--ring-size);
    height: var(--ring-size);
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--mode-color, var(--accent));
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 1s ease;
    filter: drop-shadow(0 0 8px var(--mode-color, var(--accent)));
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--text);
    transition: color 0.4s;
  }

  .session-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-main {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    background: var(--mode-color, var(--accent));
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px -5px var(--mode-color, var(--accent));
  }
  .btn-main:hover { transform: scale(1.06); }
  .btn-main:active { transform: scale(0.96); }
  .btn-main svg { width: 26px; height: 26px; }

  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--text); color: var(--text); }
  .btn-icon svg { width: 16px; height: 16px; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 24px;
    animation: fadeUp 0.6s 0.35s ease both;
  }
  .stat {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text);
    line-height: 1;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat-divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
    margin: 4px 0;
  }

  /* Task input */
  .task-section {
    width: 100%;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .task-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .task-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .task-input::placeholder { color: var(--muted); }
  .task-input:focus { border-color: var(--mode-color, var(--accent)); }

  /* Log */
  .log-section {
    width: 100%;
    animation: fadeUp 0.6s 0.45s ease both;
  }
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .log-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .log-clear {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .log-clear:hover { color: var(--accent); }

  .log-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 130px;
    overflow-y: auto;
  }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    animation: slideIn 0.3s ease;
  }
  .log-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .log-text {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .empty-log {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
    letter-spacing: 0.1em;
  }

  /* Notification flash */
  .flash {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text);
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .flash.show { transform: translateX(-50%) translateY(0); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pulsing .time-display { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="glow-orb a" id="glowA"></div>
<div class="glow-orb b" id="glowB"></div>

<div class="flash" id="flash"></div>

<div class="container">

  <div class="header">
    <h1>Focus Session</h1>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="work" onclick="setMode('work')">Work</button>
    <button class="mode-btn" data-mode="break" onclick="setMode('break')">Short Break</button>
    <button class="mode-btn" data-mode="long" onclick="setMode('long')">Long Break</button>
  </div>

  <div class="ring-wrapper" id="ringWrapper">
    <svg class="ring-svg" viewBox="0 0 260 260">
      <circle class="ring-track" cx="130" cy="130" r="114"/>
      <circle class="ring-progress" id="ringProgress" cx="130" cy="130" r="114"
        stroke-dasharray="716.28"
        stroke-dashoffset="0"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="session-label" id="sessionLabel">FOCUS</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-icon" onclick="skipBack()" title="Restart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.27"/>
      </svg>
    </button>
    <button class="btn-main" id="playBtn" onclick="toggleTimer()">
      <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>
    <button class="btn-icon" onclick="skipNext()" title="Skip">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="statPomos">0</div>
      <div class="stat-label">Pomodoros</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="statFocus">0</div>
      <div class="stat-label">Min Focused</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">Streak</div>
    </div>
  </div>

  <div class="task-section">
    <label class="task-label" for="taskInput">Current Task</label>
    <input class="task-input" id="taskInput" type="text" placeholder="What are you working on?">
  </div>

  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Session Log</span>
      <button class="log-clear" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-log" id="emptyLog">No sessions yet — get to work!</div>
    </div>
  </div>

</div>

<script>
  const MODES = {
    work:  { label: 'FOCUS',       seconds: 25 * 60, color: '#e8533a' },
    break: { label: 'SHORT BREAK', seconds:  5 * 60, color: '#4ea8a0' },
    long:  { label: 'LONG BREAK',  seconds: 15 * 60, color: '#7b6fd4' },
  };

  let currentMode = 'work';
  let totalSeconds = MODES.work.seconds;
  let remaining = totalSeconds;
  let running = false;
  let interval = null;
  let pomodoroCount = 0;
  let focusSeconds = 0;
  let streak = 0;
  let lastCompleted = null;
  let log = [];

  const CIRCUMFERENCE = 2 * Math.PI * 114; // ≈ 716.28

  const timeDisplay = document.getElementById('timeDisplay');
  const sessionLabel = document.getElementById('sessionLabel');
  const ringProgress = document.getElementById('ringProgress');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const ringWrapper = document.getElementById('ringWrapper');
  const glowA = document.getElementById('glowA');
  const glowB = document.getElementById('glowB');

  function setMode(mode, auto = false) {
    if (running && !auto) { stopTimer(); }
    currentMode = mode;
    const m = MODES[mode];
    totalSeconds = m.seconds;
    remaining = totalSeconds;
    running = false;
    clearInterval(interval);

    // Update UI color
    document.documentElement.style.setProperty('--mode-color', m.color);
    glowA.style.background = m.color;

    // Update tabs
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });

    sessionLabel.textContent = m.label;
    updateDisplay();
    setPlayIcon(false);
    ringWrapper.classList.remove('pulsing');
    document.title = 'FOCUS — Pomodoro Timer';
  }

  function updateDisplay() {
    const m = String(Math.floor(remaining / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    timeDisplay.textContent = `${m}:${s}`;

    const progress = remaining / totalSeconds;
    const offset = CIRCUMFERENCE * progress;
    ringProgress.style.strokeDashoffset = CIRCUMFERENCE - offset;
  }

  function toggleTimer() {
    if (running) stopTimer();
    else startTimer();
  }

  function startTimer() {
    running = true;
    setPlayIcon(true);
    ringWrapper.classList.add('pulsing');
    interval = setInterval(tick, 1000);
  }

  function stopTimer() {
    running = false;
    setPlayIcon(false);
    ringWrapper.classList.remove('pulsing');
    clearInterval(interval);
  }

  function tick() {
    remaining--;
    updateDisplay();
    document.title = timeDisplay.textContent + ' — ' + MODES[currentMode].label;

    if (currentMode === 'work') {
      focusSeconds++;
      document.getElementById('statFocus').textContent = Math.floor(focusSeconds / 60);
    }

    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      ringWrapper.classList.remove('pulsing');
      onComplete();
    }
  }

  function onComplete() {
    const task = document.getElementById('taskInput').value.trim();
    const now = new Date();

    if (currentMode === 'work') {
      pomodoroCount++;
      // Streak logic
      if (lastCompleted) {
        const diff = (now - lastCompleted) / 1000 / 60;
        streak = diff < 60 ? streak + 1 : 1;
      } else {
        streak = 1;
      }
      lastCompleted = now;
      updateStats();
      addLog(task || 'Untitled session', MODES.work.color);
      showFlash('🍅  Pomodoro complete! Take a break.');

      // Auto-switch to break
      setTimeout(() => {
        setMode(pomodoroCount % 4 === 0 ? 'long' : 'break', true);
        startTimer();
      }, 1200);
    } else {
      showFlash('⚡  Break over. Back to focus!');
      setTimeout(() => { setMode('work', true); }, 1200);
    }

    // Play sound (oscillator beep)
    playBeep();
  }

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.4);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.7);
    } catch(e) {}
  }

  function updateStats() {
    document.getElementById('statPomos').textContent = pomodoroCount;
    document.getElementById('statFocus').textContent = Math.floor(focusSeconds / 60);
    document.getElementById('statStreak').textContent = streak;
  }

  function addLog(task, color) {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    log.unshift({ task, color, time });
    renderLog();
  }

  function renderLog() {
    const list = document.getElementById('logList');
    const empty = document.getElementById('emptyLog');
    if (log.length === 0) {
      empty.style.display = 'block';
      list.querySelectorAll('.log-item').forEach(el => el.remove());
      return;
    }
    empty.style.display = 'none';
    list.querySelectorAll('.log-item').forEach(el => el.remove());
    log.slice(0, 8).forEach(entry => {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.innerHTML = `
        <div class="log-dot" style="background:${entry.color}"></div>
        <div class="log-text">${entry.task}</div>
        <div class="log-time">${entry.time}</div>
      `;
      list.appendChild(item);
    });
  }

  function clearLog() {
    log = [];
    renderLog();
  }

  function skipBack() {
    stopTimer();
    remaining = totalSeconds;
    updateDisplay();
    setPlayIcon(false);
  }

  function skipNext() {
    stopTimer();
    if (currentMode === 'work') {
      setMode(pomodoroCount % 4 === 3 ? 'long' : 'break');
    } else {
      setMode('work');
    }
  }

  function setPlayIcon(playing) {
    if (playing) {
      playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    } else {
      playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
    }
  }

  let flashTimeout;
  function showFlash(msg) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(flashTimeout);
    flashTimeout = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Init
  setMode('work');
  updateDisplay();
</script>
</body>
</html>
